apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: 702147683442.dkr.ecr.eu-west-2.amazonaws.com/myapp:latest
          ports:
            - containerPort: 80
